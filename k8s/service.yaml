# Service 리소스: 파드 집합에 대한 네트워크 진입점 제공
apiVersion: v1
kind: Service
metadata:
  # 서비스 리소스 이름
  name: basicweb-service
spec:
  # 외부 노드 포트를 열어 접속 가능하게 설정
  type: NodePort # 외부에서 직접 IP를 입력해서 접속할 수 있도록 NodePort 타입으로 만들기
  selector:
    # app=basicweb 라벨을 가진 파드로 트래픽 전달
    app: basicweb
  ports:
    # Service 포트와 대상 컨테이너 포트 매핑
    - port: 80
      targetPort: 8000
      # 클러스터 노드에서 외부에 노출할 포트
      nodePort: 30000 # 브라우저에서 접속시 30000번 포트로 접속하도록 설정
