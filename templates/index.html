<!doctype html>
<html lang="ko">
  <head>
    <!-- 문서 기본 인코딩 및 반응형 viewport 설정 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 브라우저 탭 제목 -->
    <title>강의자료 요약 웹</title>
    <!-- 화면 스타일(CSS) 로드 -->
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <!-- 배경 분위기를 위한 장식 요소 -->
    <div class="bg-shape bg-shape-one"></div>
    <div class="bg-shape bg-shape-two"></div>

    <main class="container">
      <!-- 상단 소개 영역 -->
      <header class="hero">
        <!-- 서비스 이름/브랜딩 라벨 -->
        <p class="eyebrow">Summing-up AI</p>
        <!-- 페이지 메인 제목 -->
        <h1>강의자료 요약 웹</h1>
        <!-- 서비스 설명 문구 -->
        <p class="hero-sub">
          PDF/PPTX 강의자료를 업로드하면 핵심만 요약해 드립니다.
        </p>
      </header>

      <!-- 사용자 입력 영역 -->
      <section class="panel" aria-labelledby="input-title">
        <!-- 스크린리더와 연결된 섹션 제목 -->
        <h2 id="input-title">요약할 파일 업로드</h2>
        <!-- 파일 업로드 입력: PDF/PPT/PPTX만 허용 -->
        <input
          id="lectureFile"
          type="file"
          accept=".pdf,.ppt,.pptx,application/pdf,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation"
        />
        <!-- 실행 버튼과 상태 메시지를 묶는 영역 -->
        <div class="actions">
          <!-- 요약 요청 실행 버튼 -->
          <button id="summarizeBtn" type="button">파일 요약하기</button>
          <!-- JS가 상태(진행/완료/오류)를 출력하는 영역 -->
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </section>

      <!-- 요약 출력 영역 -->
      <section class="panel" aria-labelledby="result-title">
        <!-- 결과 섹션 제목 -->
        <h2 id="result-title">요약 결과</h2>
        <!-- 요약 텍스트 출력 영역 (줄바꿈 유지) -->
        <pre id="summaryResult" class="result">아직 요약 결과가 없습니다.</pre>
      </section>
    </main>

    <!-- 프론트 동작 스크립트 로드 (HTML 파싱 후 실행) -->
    <script src="/static/app.js" defer></script>
  </body>
</html>
