<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>강의자료 요약 웹</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <!-- 배경 분위기를 위한 장식 요소 -->
    <div class="bg-shape bg-shape-one"></div>
    <div class="bg-shape bg-shape-two"></div>

    <main class="container">
      <!-- 상단 소개 영역 -->
      <header class="hero">
        <p class="eyebrow">Summing-up AI</p>
        <h1>강의자료 요약 웹</h1>
        <p class="hero-sub">
          긴 강의 노트를 붙여 넣으면 핵심만 3줄로 압축해 드립니다.
        </p>
      </header>

      <!-- 사용자 입력 영역 -->
      <section class="panel" aria-labelledby="input-title">
        <h2 id="input-title">요약할 내용 입력</h2>
        <textarea
          id="lectureText"
          placeholder="예: 운영체제 5주차 강의내용..."
          rows="12"
        ></textarea>
        <div class="actions">
          <button id="summarizeBtn" type="button">요약하기</button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
      </section>

      <!-- 요약 출력 영역 -->
      <section class="panel" aria-labelledby="result-title">
        <h2 id="result-title">요약 결과</h2>
        <pre id="summaryResult" class="result">아직 요약 결과가 없습니다.</pre>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
